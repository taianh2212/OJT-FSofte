<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - TourBooking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #777;
            font-weight: 500;
        }

        .tab.active {
            border-bottom: 2px solid #2d9cdb;
            color: #2d9cdb;
            font-weight: 600;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            background: #2d9cdb;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-size: 1em;
        }

        .btn:hover {
            background: #2581b5;
        }

        .message {
            margin-top: 15px;
            font-size: 0.9em;
            text-align: center;
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.85em;
            color: #2d9cdb;
            cursor: pointer;
            margin-top: -10px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h2 style="text-align: center; margin-top: 0;">TourBooking</h2>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <div id="loginSection" class="form-section active">
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <div class="forgot-link" onclick="switchTab('forgot')">Forgot Password?</div>
                <button type="submit" class="btn">Sign In</button>
                <div id="loginMessage" class="message"></div>
            </form>
        </div>

        <div id="registerSection" class="form-section">
            <form id="registerForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" required placeholder="Email address">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required placeholder="••••••••">
                </div>
                <!-- Adding phone and address for user creation, if required by model -->
                <!-- <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="regPhone" required placeholder="Phone Number">
                </div> -->
                <button type="submit" class="btn">Register</button>
                <div id="registerMessage" class="message"></div>
            </form>
        </div>

        <div id="forgotSection" class="form-section">
            <h3 style="text-align: center; margin-top: 0;">Reset Password</h3>
            <p style="font-size: 0.9em; color: #666; text-align: center;">Enter your email and we'll send a reset link.
            </p>
            <form id="forgotForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="forgotEmail" required placeholder="name@example.com">
                </div>
                <button type="submit" class="btn">Send Reset Link</button>
                <div style="text-align: center; margin-top: 15px; cursor: pointer; color: #2d9cdb; font-size: 0.9em;"
                    onclick="switchTab('login')">Back to Login</div>
                <div id="forgotMessage" class="message"></div>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));

            if (tab === 'login' || tab === 'register') {
                const tabs = document.querySelectorAll('.tab');
                if (tab === 'login') tabs[0].classList.add('active');
                if (tab === 'register') tabs[1].classList.add('active');
            }

            document.getElementById(tab + 'Section').classList.add('active');
            document.querySelectorAll('.message').forEach(m => m.innerHTML = '');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            const msgEl = document.getElementById('loginMessage');
            msgEl.textContent = 'Logging in...';
            msgEl.style.color = '#333';

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.code === 200) {
                    msgEl.style.color = 'green';
                    msgEl.textContent = 'Login successful!';
                    localStorage.setItem('token', data.data.token);
                    setTimeout(() => window.location.href = '/user/tours.html', 1000);
                } else {
                    msgEl.style.color = 'red';
                    msgEl.textContent = data.message || 'Login failed';
                }
            } catch (err) {
                msgEl.style.color = 'red';
                msgEl.textContent = 'Network error';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('regEmail').value,
                fullName: document.getElementById('regName').value,
                password: document.getElementById('regPassword').value,
                // phoneNumber: document.getElementById('regPhone').value
            };

            const msgEl = document.getElementById('registerMessage');
            msgEl.textContent = 'Registering and sending email...';
            msgEl.style.color = '#333';

            try {
                const res = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.code === 201) {
                    msgEl.style.color = 'green';
                    msgEl.textContent = 'Registration successful! Check your email to verify.';
                } else {
                    msgEl.style.color = 'red';
                    msgEl.textContent = data.message || 'Registration failed';
                }
            } catch (err) {
                msgEl.style.color = 'red';
                msgEl.textContent = 'Network error';
            }
        });

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('forgotEmail').value,
            };

            const msgEl = document.getElementById('forgotMessage');
            msgEl.textContent = 'Sending request...';
            msgEl.style.color = '#333';

            try {
                const res = await fetch('/api/v1/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.code === 200) {
                    msgEl.style.color = 'green';
                    msgEl.textContent = 'Reset link sent! Please check your email.';
                } else {
                    msgEl.style.color = 'red';
                    msgEl.textContent = data.message || 'Failed to send reset link';
                }
            } catch (err) {
                msgEl.style.color = 'red';
                msgEl.textContent = 'Network error';
            }
        });
    </script>
</body>

</html>
