<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - TourBooking</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 460px; }
    .message { margin-top: 12px; font-size: 0.92em; text-align: center; }
    .muted-link { display: block; text-align: center; margin-top: 14px; color: var(--primary); text-decoration: none; }
    form { display: grid; gap: 12px; }
  </style>
</head>
<body>
  <div class="wrap card">
    <h2 style="text-align:center;margin-bottom:6px;">Reset Password</h2>
    <p style="text-align:center;color:var(--text-muted);margin-bottom:14px;">Enter a new password for your account.</p>

    <form id="resetForm">
      <div>
        <label>New Password</label>
        <input type="password" id="newPassword" required placeholder="••••••••" minlength="6" />
      </div>
      <div>
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" required placeholder="••••••••" minlength="6" />
      </div>
      <button type="submit" class="btn">Update Password</button>
      <div id="message" class="message"></div>
    </form>

    <a class="muted-link" href="/pages/auth/login.html">Back to Login</a>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const msgEl = document.getElementById('message');
    const form = document.getElementById('resetForm');

    function setMsg(text, color) {
      msgEl.textContent = text;
      msgEl.style.color = color || '#333';
    }

    if (!token) {
      setMsg('Missing reset token. Please use the link from your email again.', 'red');
      form.querySelector('button[type="submit"]').disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        setMsg('Passwords do not match.', 'red');
        return;
      }

      setMsg('Updating password...', '#333');
      try {
        const url = `/api/v1/auth/reset-password?token=${encodeURIComponent(token)}&newPassword=${encodeURIComponent(newPassword)}`;
        const res = await fetch(url, { method: 'POST' });
        const data = await res.json();
        if (data.code === 200) {
          setMsg('Password updated successfully. You can now log in.', 'green');
          setTimeout(() => window.location.href = '/pages/auth/login.html', 1200);
        } else {
          setMsg(data.message || 'Invalid or expired token.', 'red');
        }
      } catch (err) {
        setMsg('Network error. Please try again.', 'red');
      }
    });
  </script>
</body>
</html>
