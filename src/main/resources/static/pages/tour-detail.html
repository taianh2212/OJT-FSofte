<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tour Detail - TourBooking</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body { font-family: 'Outfit', sans-serif; }
    .twoCol { display:grid; grid-template-columns: 1.2fr 0.8fr; gap: 18px; align-items:start; margin-top: 20px; }
    .list { display:grid; gap:12px; }
    /* .thumb { min-height: 260px; } */
    .pillRow { display:flex; gap:8px; flex-wrap:wrap; margin-top: 10px; }
    .carousel { position: relative; width: 100%; height: 320px; border-radius: 22px; overflow: hidden; background: var(--bg-card); }
    .carousel-img { width: 100%; height: 100%; object-fit: cover; }
    .review-card { padding: 18px; border-radius: 18px; background: rgba(255,255,255,0.6); border: 1px solid var(--border); margin-top: 14px; }
    @media (max-width: 960px) {
      .twoCol { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-shell">
      <div class="content-pad">
        <div class="top">
          <a class="back-link" href="./tours.html">← Back to tours</a>
          <div id="navActions" class="actions">
            <button class="btn btn-secondary" id="addCompareBtn" type="button">Add to compare</button>
            <a class="btn" href="./compare.html">Compare</a>
          </div>
        </div>

        <div class="twoCol">
          <div class="card panel">
            <div id="carousel" class="carousel">
              <div class="thumb">Loading media...</div>
            </div>
            <h2 id="title" class="section-title" style="margin-top:24px;"></h2>
            <div class="pillRow" id="pills"></div>
            <p id="desc" class="section-copy" style="margin-top:14px;"></p>

            <h3 class="section-title" style="margin-top:32px;font-size:1.5rem;">Highlights</h3>
            <div id="highlights" class="list"></div>

            <!-- UC05 Expansion: Reviews -->
            <h3 class="section-title" style="margin-top:48px;font-size:1.5rem;">Traveler Reviews</h3>
            <div id="reviews" class="list" style="margin-top:16px;">
              <div class="card empty-state">No reviews yet. Be the first to join a tour and share!</div>
            </div>
          </div>

          <div class="glass-list">
            <div class="card panel">
              <div class="eyebrow">Summary</div>
              <div class="list" style="margin-top:14px;">
                <div class="list-item"><strong>Price:</strong> <span id="price"></span></div>
                <div class="list-item"><strong>Rating:</strong> <span id="rating"></span></div>
                <div class="list-item"><strong>Duration:</strong> <span id="duration"></span></div>
                <div class="list-item"><strong>Route:</strong> <span id="route"></span></div>
                <div class="list-item"><strong>Category:</strong> <span id="category"></span></div>
              </div>
              <div style="margin-top:20px; padding: 14px; border-radius: 14px; background: rgba(15, 118, 110, 0.08); border: 1px dashed var(--accent);">
                <p style="font-size:0.9rem; margin:0; color:var(--accent-deep); font-weight:700;">Log in or create an account to book your spot on this departure.</p>
              </div>
            </div>

            <div class="card panel">
              <div class="eyebrow">Schedules</div>
              <div id="schedules" class="list" style="margin-top:14px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/tour-detail.js"></script>
</body>
</html>
