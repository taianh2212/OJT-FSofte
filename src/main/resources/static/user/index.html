<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - TourBooking</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .navbar {
            background: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .main-hero {
            padding: 5rem 5%;
            text-align: center;
            background: linear-gradient(rgba(99, 102, 241, 0.05), rgba(255, 255, 255, 0));
        }
        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><strong>TourBooking</strong></div>
        <div id="userInfo"></div>
    </nav>

    <div class="main-hero">
        <h1 class="hero-title">Experience the World Like Never Before</h1>
        <p>Book unique tours and create memories that last forever.</p>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            document.getElementById('userInfo').innerText = `Hello, ${user.fullName}`;
        } else {
            window.location.href = '/auth/login.html';
        }
    </script>
</body>
</html>
