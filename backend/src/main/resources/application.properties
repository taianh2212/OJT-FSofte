spring.application.name=booking
server.port=8080

# Serve static frontend: pages at root URL, assets/scripts from parent, classpath fallback
spring.web.resources.static-locations=file:../frontend/pages/,file:../frontend/,classpath:/static/

# Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TourBookingDB;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.leak-detection-threshold=20000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Base URL
app.public-base-url=http://localhost:8080

# JWT
app.jwt.secret=dev-only-change-me
app.jwt.exp-minutes=120

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=krissv659@gmail.com
spring.mail.password=tbessuaqbdhwrupn
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Gemini AI
gemini.api.key=AIzaSyBaD4NgAsZX6Jpk3rPAu8q74Oh8zet5EMA
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent

# PayOS
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.base-url=${PAYOS_BASE_URL:https://api-merchant.payos.vn}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:8080/pages/user/history.html}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:8080/pages/user/checkout.html}

# Tour Import
tour.import.enabled=true
tour.import.directory=data/tours

# Exchange Rates
currency.rate.eur.vnd=30000
currency.rate.usd.vnd=26400
app.default.image=https://example.com/default.jpg

# Encoding settings
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
