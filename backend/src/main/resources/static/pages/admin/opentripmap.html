<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · OpenTripMap</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    body {
      background:#050505;
    }
    .page-shell {
      max-width: 960px;
      margin:0 auto;
    }
    .panel {
      background:rgba(255,255,255,0.02);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:24px;
      box-shadow:0 15px 35px rgba(0,0,0,0.4);
    }
    .controls {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-end;
      margin-bottom:18px;
    }
    .status-card {
      margin-top:18px;
      padding:18px;
      border-radius:16px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.05);
      min-height:120px;
    }
    .badge {
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(15,23,42,0.7);
      border:1px solid rgba(255,255,255,0.2);
      font-size:0.85rem;
      letter-spacing:0.05em;
      text-transform:uppercase;
    }
    .status-row {
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      font-size:0.95rem;
      margin-top:12px;
    }
    .muted {
      color:rgba(255,255,255,0.75);
      font-size:0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-shell wrap">
      <div class="content-pad">
        <header class="admin-hero">
          <div class="eyebrow" style="background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.18);color:white;">Admin · OpenTripMap</div>
          <h1>Seed OpenTripMap tours</h1>
          <p class="muted">Trigger the backend to pull activities for a city and keep your database fresh.</p>
        </header>

        <section class="panel">
          <div class="controls">
            <label style="flex:1;min-width:200px;">
              <span class="muted" style="display:block;margin-bottom:6px;">City name</span>
              <input id="cityInput" class="input" value="PARIS" placeholder="Enter a city (Paris, Tokyo, ...)" />
            </label>
            <button id="fetchBtn" class="btn">Fetch from OpenTripMap</button>
            <span id="lastRun" class="muted">Last run: never</span>
          </div>
          <div class="status-card" id="statusCard">
            <div id="statusMessage" class="muted">No requests yet.</div>
            <div class="status-row" id="statusRow" hidden>
              <div><strong>Inserted:</strong> <span id="insertedCount">0</span></div>
              <div><strong>Skipped:</strong> <span id="skippedCount">0</span></div>
              <div><span class="badge" id="lastStatus">idle</span></div>
            </div>
          </div>
        </section>

      </div>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/admin-opentripmap.js"></script>
</body>
</html>
