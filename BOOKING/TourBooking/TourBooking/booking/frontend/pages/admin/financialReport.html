<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Report - TourBooking Admin</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--text-main);
            color: white;
            padding: 2rem 1.5rem;
        }

        .sidebar .logo {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 3rem;
            display: block;
            text-decoration: none;
        }

        .nav-item {
            padding: 0.75rem 1rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: block;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .main-content {
            flex: 1;
            padding: 2rem 5%;
            background-color: #f1f5f9;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-section {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .filter-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.875rem;
        }

        .filter-group input,
        .filter-group select {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            min-width: 150px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: #64748b;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-success {
            background: #10b981;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .export-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: white;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-box .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-box .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .report-table {
            background: white;
            border-radius: 1rem;
            overflow: auto;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background: #f8fafc;
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }

        tr:hover {
            background: #f8fafc;
        }

        .chart-container {
            margin-bottom: 1.5rem;
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .chart-container canvas {
            max-height: 300px;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <a href="./dashboard.html" class="logo"><strong>TourBooking</strong> Admin</a>
            <nav>
                <a href="./dashboard.html" class="nav-item">Dashboard</a>
                <a href="./manageTours.html" class="nav-item">Manager Tours</a>
                <a href="./manageCatelories.html" class="nav-item">Manager Categories</a>
                <a href="./manageUsers.html" class="nav-item">Manager User</a>
                <a href="./manageReviews.html" class="nav-item">Manager Reviews</a>
                <a href="./financialReport.html" class="nav-item">Financial Report</a>

            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Financial Report</h1>
                <div class="user-actions">
                    <span id="userInfo" style="font-weight: 600;"></span>
                    <button id="logoutBtn" class="btn-secondary" style="margin-left: 1rem;">Logout</button>
                </div>
            </header>

            <div class="filter-section">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>From Date</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="filter-group">
                        <label>To Date</label>
                        <input type="date" id="endDate">
                    </div>
                    <div class="filter-group">
                        <label>Report Type</label>
                        <select id="reportType">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="bookingStatus">
                            <option value="all">All</option>
                            <option value="CONFIRMED">Confirmed</option>
                            <option value="COMPLETED">Completed</option>
                            <option value="CANCELLED">Cancelled</option>
                        </select>
                    </div>
                    <button onclick="loadReport()" class="btn-primary">Generate Report</button>
                </div>
            </div>

            <div class="export-buttons" style="margin-bottom: 1rem;">
                <button onclick="exportToExcel()" class="btn-success">📊 Export to Excel</button>
                <button onclick="exportToPDF()" class="btn-danger">📄 Export to PDF</button>
            </div>

            <div class="stats-summary" id="statsSummary">
                <div class="stat-box">
                    <div class="label">Total Revenue</div>
                    <div class="value" id="totalRevenue">₫0</div>
                </div>
                <div class="stat-box">
                    <div class="label">Total Bookings</div>
                    <div class="value" id="totalBookings">0</div>
                </div>
                <div class="stat-box">
                    <div class="label">Average Order Value</div>
                    <div class="value" id="avgOrderValue">₫0</div>
                </div>
                <div class="stat-box">
                    <div class="label">Cancellation Rate</div>
                    <div class="value" id="cancelRate">0%</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="revenueChart"></canvas>
            </div>

            <div class="report-table">
                <table id="reportTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Bookings</th>
                            <th>Revenue</th>
                            <th>Avg. Value</th>
                            <th>Cancellations</th>
                        </tr>
                    </thead>
                    <tbody id="reportBody">
                        <tr>
                            <td colspan="5" class="loading">Select date range to generate report</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = "http://localhost:8080/api/v1";
        let currentReportData = [];
        let revenueChart;

        const currentUser = JSON.parse(localStorage.getItem('user'));
        if (!currentUser || currentUser.role !== 'ADMIN') {
            window.location.href = '/auth/login.html';
        } else {
            document.getElementById('userInfo').innerText = currentUser.fullName;
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = '/auth/login.html';
        });

        // Set default dates
        const today = new Date();
        const firstDayOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
        document.getElementById('startDate').value = firstDayOfMonth.toISOString().split('T')[0];
        document.getElementById('endDate').value = today.toISOString().split('T')[0];

        async function loadReport() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const reportType = document.getElementById('reportType').value;
            const status = document.getElementById('bookingStatus').value;

            if (!startDate || !endDate) {
                alert('Please select date range');
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/admin/financial-report?start=${startDate}&end=${endDate}&type=${reportType}&status=${status}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const result = await response.json();
                const data = result.data || [];
                currentReportData = data;
                renderReport(data);
                updateStats(data);
                updateChart(data);
            } catch (error) {
                console.error('Error loading report:', error);
                alert('Failed to load report. Please try again.');
            }
        }

        function renderReport(data) {
            const tbody = document.getElementById('reportBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No data available for selected period</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.period || item.date}</td>
                    <td>${item.bookingCount || 0}</td>
                    <td>${formatCurrency(item.revenue || 0)}</td>
                    <td>${formatCurrency(item.averageValue || 0)}</td>
                    <td>${item.cancellations || 0}</td>
                </tr>
            `).join('');
        }

        function updateStats(data) {
            const totalRevenue = data.reduce((sum, item) => sum + (item.revenue || 0), 0);
            const totalBookings = data.reduce((sum, item) => sum + (item.bookingCount || 0), 0);
            const totalCancellations = data.reduce((sum, item) => sum + (item.cancellations || 0), 0);
            const avgOrderValue = totalBookings > 0 ? totalRevenue / totalBookings : 0;
            const cancelRate = totalBookings > 0 ? (totalCancellations / totalBookings * 100).toFixed(1) : 0;

            document.getElementById('totalRevenue').innerHTML = formatCurrency(totalRevenue);
            document.getElementById('totalBookings').innerHTML = totalBookings;
            document.getElementById('avgOrderValue').innerHTML = formatCurrency(avgOrderValue);
            document.getElementById('cancelRate').innerHTML = `${cancelRate}%`;
        }

        function updateChart(data) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            if (revenueChart) revenueChart.destroy();

            revenueChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(item => item.period || item.date),
                    datasets: [
                        {
                            label: 'Revenue (VND)',
                            data: data.map(item => item.revenue || 0),
                            backgroundColor: 'rgba(59, 130, 246, 0.7)',
                            yAxisID: 'y'
                        },
                        {
                            label: 'Bookings',
                            data: data.map(item => item.bookingCount || 0),
                            backgroundColor: 'rgba(16, 185, 129, 0.7)',
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    if (ctx.dataset.label === 'Revenue (VND)') {
                                        return `${ctx.dataset.label}: ${formatCurrency(ctx.raw)}`;
                                    }
                                    return `${ctx.dataset.label}: ${ctx.raw}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: (value) => formatCurrency(value)
                            }
                        },
                        y1: {
                            beginAtZero: true,
                            position: 'right'
                        }
                    }
                }
            });
        }

        function exportToExcel() {
            if (!currentReportData || currentReportData.length === 0) {
                alert('No data to export');
                return;
            }

            const wsData = [
                ['Financial Report'],
                [`Generated: ${new Date().toLocaleString()}`],
                ['Period', 'Start Date', 'End Date', 'Bookings', 'Revenue', 'Average Value', 'Cancellations'],
                ...currentReportData.map(item => [
                    item.period || item.date,
                    item.startDate || '',
                    item.endDate || '',
                    item.bookingCount || 0,
                    item.revenue || 0,
                    item.averageValue || 0,
                    item.cancellations || 0
                ])
            ];

            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Financial Report');

            const fileName = `financial_report_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, fileName);
        }

        async function exportToPDF() {
            if (!currentReportData || currentReportData.length === 0) {
                alert('No data to export');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape' });

            // Title
            doc.setFontSize(18);
            doc.text('Financial Report', 14, 15);

            // Date range info
            doc.setFontSize(10);
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            doc.text(`Period: ${startDate} to ${endDate}`, 14, 25);
            doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 31);

            // Summary stats
            const totalRevenue = currentReportData.reduce((s, i) => s + (i.revenue || 0), 0);
            const totalBookings = currentReportData.reduce((s, i) => s + (i.bookingCount || 0), 0);

            doc.setFontSize(11);
            doc.text(`Total Revenue: ${formatCurrency(totalRevenue)}`, 14, 40);
            doc.text(`Total Bookings: ${totalBookings}`, 14, 47);
            doc.text(`Average Order Value: ${formatCurrency(totalBookings ? totalRevenue / totalBookings : 0)}`, 14, 54);

            // Table
            const tableData = currentReportData.map(item => [
                item.period || item.date,
                item.bookingCount || 0,
                formatCurrency(item.revenue || 0),
                formatCurrency(item.averageValue || 0),
                item.cancellations || 0
            ]);

            doc.autoTable({
                startY: 62,
                head: [['Period', 'Bookings', 'Revenue', 'Avg. Value', 'Cancellations']],
                body: tableData,
                theme: 'striped',
                headStyles: { fillColor: [59, 130, 246] },
                columnStyles: {
                    0: { cellWidth: 40 },
                    1: { cellWidth: 30 },
                    2: { cellWidth: 45 },
                    3: { cellWidth: 45 },
                    4: { cellWidth: 35 }
                }
            });

            doc.save(`financial_report_${new Date().toISOString().split('T')[0]}.pdf`);
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }

        // Load initial report
        loadReport();
    </script>
</body>

</html>
