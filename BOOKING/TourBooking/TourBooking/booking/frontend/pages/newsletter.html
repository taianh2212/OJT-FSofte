<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter - TourBooking</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="container">
    <div class="page-shell">
      <div class="content-pad">
        <div class="hero-grid" style="grid-template-columns:0.95fr 1.05fr;">
          <div class="card hero-art">
            <div class="stack">
              <a class="back-link" href="./index.html" style="color:white;">← Home</a>
              <div class="eyebrow" style="background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.18);color:white;">Weekly Dispatch</div>
              <h2>Get fresh tour ideas, seasonal deals, and route highlights in your inbox.</h2>
              <p>The newsletter page now fits the rest of the product instead of feeling like an isolated form.</p>
            </div>
          </div>

          <div class="card form-card panel">
            <div>
              <div class="eyebrow">Subscribe</div>
              <h2 class="section-title" style="margin-top:14px;">Newsletter</h2>
              <p class="section-copy">Join for travel deals and updates on newly launched tours.</p>
            </div>
            <form id="form" class="row">
              <div>
                <label>Email</label>
                <input type="email" id="email" required placeholder="name@example.com" />
              </div>
              <button class="btn" type="submit">Subscribe</button>
              <div id="msg" class="message"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/newsletter.js"></script>
</body>
</html>
