<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hồ Sơ Của Tôi - TourBooking</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .layout { display:grid; grid-template-columns: 240px 1fr; gap: 24px; align-items:start; margin-top: 20px; }
    .sidebar-menu { display: flex; flex-direction: column; gap: 8px; }
    .sidebar-menu a { padding: 12px 16px; border-radius: 8px; text-decoration: none; color: var(--text-base); font-weight: 600; }
    .sidebar-menu a:hover { background: rgba(0,0,0,0.05); }
    .sidebar-menu a.active { background: var(--primary); color: white; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: var(--text-base); }
    .form-group input { width: 100%; padding: 10px; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; font-family: inherit; font-size: 1rem; }
    
    .loyalty-card { margin-bottom: 24px; background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 24px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    .loyalty-points { font-size: 2.5rem; font-weight: 800; font-family: 'Fraunces', serif; }
    
    .upload-zone { border: 2px dashed rgba(0,0,0,0.2); padding: 30px; text-align: center; border-radius: 12px; cursor: pointer; transition: 0.2s; }
    .upload-zone:hover { background: rgba(0,0,0,0.02); border-color: var(--primary); }
    
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar-menu { flex-direction: row; overflow-x: auto; }
      .loyalty-card { flex-direction: column; text-align: center; gap: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-shell">
      <div class="content-pad">
        <div class="topbar">
          <a class="brand" href="../pages/index.html">
            <span class="brand-mark">TB</span>
            <span class="brand-copy">
              <strong>TourBooking</strong>
              <span>An tâm tận hưởng</span>
            </span>
          </a>
        </div>

        <div class="layout">
          <div class="card panel">
            <nav class="sidebar-menu">
              <a href="personal-info.html">Thông tin cá nhân</a>
              <a href="profile.html" class="active">Cập nhật hồ sơ</a>
              <a href="history.html">Lịch sử đặt tour</a>
            </nav>
          </div>

          <div>
            <!-- View Loyalty Points -->
            <div class="loyalty-card">
              <div>
                <h2 style="margin:0; font-size:1.2rem; font-family:'Manrope',sans-serif; font-weight:600;">Hội Viên TourBooking</h2>
                <p style="margin:4px 0 0; color:rgba(255,255,255,0.8);" id="tierLabel">Hạng: -</p>
              </div>
              <div>
                <div class="loyalty-points" id="loyaltyPoints">0</div>
                <div style="font-size:0.85rem; text-align:right; color:rgba(255,255,255,0.8);">Điểm tích lũy</div>
              </div>
            </div>

            <div class="card panel">
              <h2 class="section-title">Cập Nhật Thông Tin</h2>
              <form onsubmit="event.preventDefault(); updateProfile();">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                  <div class="form-group">
                    <label>Họ và Tên</label>
                    <input type="text" id="profName" value="" required>
                  </div>
                  <div class="form-group">
                    <label>Email (Không thể thay đổi)</label>
                    <input type="email" id="profEmail" value="" disabled style="background:#f3f4f6; color:#9ca3af;">
                  </div>
                  <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="tel" id="profPhone" value="" required>
                  </div>
                  <div class="form-group">
                    <label>Địa chỉ</label>
                    <input type="text" id="profAddress" value="">
                  </div>
                </div>
                <button type="submit" class="btn" style="margin-top:10px;">Lưu Thay Đổi</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    function calcTier(points) {
      const p = Number(points || 0);
      if (p >= 5000) return 'Kim cương (Diamond)';
      if (p >= 2000) return 'Bạch kim (Platinum)';
      if (p >= 1000) return 'Vàng (Gold)';
      if (p >= 300) return 'Bạc (Silver)';
      return 'Thành viên (Member)';
    }

    async function loadProfile() {
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (!user?.id) {
        TB.goToLogin('Vui lòng đăng nhập để xem hồ sơ.');
        return;
      }

      const [uRes, pRes] = await Promise.all([
        TB.apiFetch(`/api/v1/users/${encodeURIComponent(user.id)}`, { method: 'GET' }),
        TB.apiFetch(`/api/v1/users/${encodeURIComponent(user.id)}/loyalty-points`, { method: 'GET' })
      ]);

      const u = uRes?.data || {};
      const points = pRes?.data ?? 0;

      $('profName').value = u.fullName || '';
      $('profEmail').value = u.email || '';
      $('profPhone').value = u.phoneNumber || '';
      $('profAddress').value = u.address || '';

      $('loyaltyPoints').textContent = Number(points || 0).toLocaleString('vi-VN');
      $('tierLabel').textContent = `Hạng: ${calcTier(points)}`;
    }

    async function updateProfile() {
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (!user?.id) {
        TB.goToLogin('Vui lòng đăng nhập.');
        return;
      }

      const payload = {
        fullName: $('profName').value.trim(),
        phoneNumber: $('profPhone').value.trim(),
        address: $('profAddress').value.trim()
      };

      await TB.apiFetch(`/api/v1/users/${encodeURIComponent(user.id)}`, {
        method: 'PUT',
        body: JSON.stringify(payload)
      });

      // refresh localStorage user fields
      const me = JSON.parse(localStorage.getItem('user') || 'null') || {};
      me.fullName = payload.fullName;
      localStorage.setItem('user', JSON.stringify(me));

      alert('Cập nhật thông tin cá nhân thành công.');
    }

    loadProfile().catch(err => {
      console.error(err);
      alert(err?.message || 'Không tải được hồ sơ');
    });
  </script>
</body>
</html>
