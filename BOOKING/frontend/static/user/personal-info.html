<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thông Tin Cá Nhân - TourBooking</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .layout { display:grid; grid-template-columns: 240px 1fr; gap: 24px; align-items:start; margin-top: 20px; }
    .sidebar-menu { display: flex; flex-direction: column; gap: 8px; }
    .sidebar-menu a { padding: 12px 16px; border-radius: 8px; text-decoration: none; color: var(--text-base); font-weight: 600; }
    .sidebar-menu a:hover { background: rgba(0,0,0,0.05); }
    .sidebar-menu a.active { background: var(--primary); color: white; }
    .info-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
    .info-item { padding: 12px 14px; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; }
    .info-item span { display:block; color:var(--text-faint); font-size: 0.85rem; margin-bottom:4px; }
    .info-item strong { word-break: break-word; }
    .kpis { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-top: 16px; }
    .kpi { padding: 14px; border-radius: 10px; background: #f8fafc; border: 1px solid rgba(0,0,0,0.06); }
    .kpi .v { font-size: 1.4rem; font-weight: 800; }
    .actions { display:flex; gap:10px; flex-wrap: wrap; margin-top:16px; }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar-menu { flex-direction: row; overflow-x: auto; }
      .info-grid, .kpis { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-shell">
      <div class="content-pad">
        <div class="topbar">
          <a class="brand" href="../pages/index.html">
            <span class="brand-mark">TB</span>
            <span class="brand-copy">
              <strong>TourBooking</strong>
              <span>An tâm tận hưởng</span>
            </span>
          </a>
        </div>

        <div class="layout">
          <div class="card panel">
            <nav class="sidebar-menu">
              <a href="personal-info.html" class="active">Thông tin cá nhân</a>
              <a href="profile.html">Cập nhật hồ sơ</a>
              <a href="history.html">Lịch sử đặt tour</a>
            </nav>
          </div>

          <div class="card panel">
            <h2 class="section-title">Trang Khách Hàng</h2>

            <div class="info-grid" style="margin-top:14px;">
              <div class="info-item"><span>Họ và tên</span><strong id="fullName">-</strong></div>
              <div class="info-item"><span>Email</span><strong id="email">-</strong></div>
              <div class="info-item"><span>Số điện thoại</span><strong id="phone">-</strong></div>
              <div class="info-item"><span>Địa chỉ</span><strong id="address">-</strong></div>
            </div>

            <div class="kpis">
              <div class="kpi">
                <div style="color:var(--text-faint); font-size:0.85rem;">Điểm tích lũy</div>
                <div class="v" id="points">0</div>
              </div>
              <div class="kpi">
                <div style="color:var(--text-faint); font-size:0.85rem;">Tổng booking</div>
                <div class="v" id="totalBookings">0</div>
              </div>
              <div class="kpi">
                <div style="color:var(--text-faint); font-size:0.85rem;">Booking đã hoàn thành</div>
                <div class="v" id="doneBookings">0</div>
              </div>
            </div>

            <div class="actions">
              <a class="btn" href="profile.html">Cập nhật hồ sơ</a>
              <a class="btn btn-secondary" href="history.html">Xem lịch sử/đánh giá/hóa đơn</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    async function loadPersonalInfo() {
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (!user?.id) {
        TB.goToLogin('Vui lòng đăng nhập để xem thông tin cá nhân.');
        return;
      }

      const [uRes, pRes, bRes] = await Promise.all([
        TB.apiFetch(`/api/v1/users/${encodeURIComponent(user.id)}`, { method: 'GET' }),
        TB.apiFetch(`/api/v1/users/${encodeURIComponent(user.id)}/loyalty-points`, { method: 'GET' }),
        TB.apiFetch(`/api/v1/bookings/user/${encodeURIComponent(user.id)}`, { method: 'GET' })
      ]);

      const u = uRes?.data || {};
      const points = Number(pRes?.data || 0);
      const bookings = Array.isArray(bRes?.data) ? bRes.data : [];
      const done = bookings.filter(b => ['COMPLETED', 'SUCCESS'].includes(String(b?.status || '').toUpperCase())).length;

      $('fullName').textContent = u.fullName || '-';
      $('email').textContent = u.email || '-';
      $('phone').textContent = u.phoneNumber || '-';
      $('address').textContent = u.address || '-';
      $('points').textContent = points.toLocaleString('vi-VN');
      $('totalBookings').textContent = String(bookings.length);
      $('doneBookings').textContent = String(done);
    }

    loadPersonalInfo().catch(err => {
      console.error(err);
      alert(err?.message || 'Không tải được thông tin cá nhân');
    });
  </script>
</body>
</html>
