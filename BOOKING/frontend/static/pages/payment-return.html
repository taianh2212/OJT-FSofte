<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả thanh toán - DANA</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .result-card {
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .status-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body style="background: #f3f4f6;">
    <div class="result-card">
        <div id="statusIcon" class="status-icon">⏳</div>
        <h1 id="statusTitle">Đang xử lý...</h1>
        <p id="statusMessage" style="color: #6b7280; margin: 20px 0;"></p>
        <a href="/" class="btn btn-primary" style="display: inline-block; padding: 12px 24px; text-decoration: none;">Về trang chủ</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const orderCode = params.get('orderCode');

        const iconEl = document.getElementById('statusIcon');
        const titleEl = document.getElementById('statusTitle');
        const msgEl = document.getElementById('statusMessage');

        // Hàm gọi API xác nhận thanh toán với Backend
        async function confirmPayment() {
            if (status === 'PAID' && orderCode) {
                try {
                    // Gọi API đổi trạng thái Booking sang CONFIRMED và cập nhật tài chính
                    const response = await fetch(`http://localhost:8080/api/v1/payments/payos/confirm/${orderCode}`);
                    const result = await response.json();
                    
                    if (result.code === 200) {
                        iconEl.innerText = '✅';
                        iconEl.classList.add('success');
                        titleEl.innerText = 'Thanh toán thành công!';
                        msgEl.innerText = `Giao dịch #${orderCode} đã được hệ thống ghi nhận. Doanh thu đã được cập nhật vào báo cáo tài chính.`;
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    console.error('Lỗi xác nhận:', error);
                    msgEl.innerText = 'Đã thanh toán nhưng gặp lỗi khi cập nhật hệ thống. Vui lòng liên hệ Admin.';
                }
            } else if (status === 'CANCELLED') {
                iconEl.innerText = '❌';
                iconEl.classList.add('error');
                titleEl.innerText = 'Thanh toán đã bị hủy';
                msgEl.innerText = 'Bạn đã hủy yêu cầu thanh toán. Booking vẫn ở trạng thái chờ.';
            } else {
                iconEl.innerText = '⚠️';
                titleEl.innerText = 'Trạng thái không xác định';
                msgEl.innerText = 'Vui lòng kiểm tra lại lịch sử giao dịch.';
            }
        }

        confirmPayment();
    </script>
</body>
</html>
