<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Discounts - DANA Admin</title>
    <link rel="stylesheet" href="../../assets/css/admin-common.css">
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/toast.js"></script>
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <a href="./dashboard.html" class="logo">DANA</a>
            <nav>
                <a href="./dashboard.html" class="nav-item">Dashboard</a>
                <a href="./manageTours.html" class="nav-item">Tours</a>
                <a href="./manageCategories.html" class="nav-item">Categories</a>
                <a href="./manageDiscounts.html" class="nav-item active">Discounts</a>
                <a href="./manageUsers.html" class="nav-item">Users</a>
                <a href="./manageReview.html" class="nav-item">Reviews</a>
                <a href="./financialReport.html" class="nav-item">Financial Report</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Discounts</h1>
                <div class="user-actions">
                    <span id="userInfo" style="font-weight: 600;"></span>
                    <button id="logoutBtn" class="btn btn-secondary" style="margin-left: 1rem;">Logout</button>
                </div>
            </header>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Discount List</h2>
                    <button onclick="openModal()" class="btn btn-primary">Add New Discount</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Type</th>
                                <th>Value</th>
                                <th>Usage</th>
                                <th>Expiry</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="discountTable">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 2rem;">Loading discounts...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="discountModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Discount</h2>
            <input type="hidden" id="discountId">
            <div class="form-group">
                <label>Code</label>
                <input type="text" id="code" class="form-control" placeholder="SUMMER2024">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="discountType" class="form-control">
                    <option value="PERCENTAGE">Percentage (%)</option>
                    <option value="FIXED_AMOUNT">Fixed Amount</option>
                </select>
            </div>
            <div class="form-group">
                <label>Value</label>
                <input type="number" id="value" class="form-control" placeholder="10">
            </div>
            <div class="form-group">
                <label>Usage Limit</label>
                <input type="number" id="usageLimit" class="form-control" placeholder="100">
            </div>
            <div class="form-group">
                <label>End Date</label>
                <input type="datetime-local" id="endDate" class="form-control">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="isActive" class="form-control">
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveDiscount()">Save Discount</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/v1/admin/discounts';
        
        // Auth check
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'ADMIN') {
            window.location.href = '/pages/auth/login.html';
        } else {
            document.getElementById('userInfo').innerText = user.fullName || user.FullName || user.email;
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (window.TB && TB.logout) {
                TB.logout();
            } else {
                localStorage.removeItem('user');
                localStorage.removeItem('token');
                window.location.href = '/pages/auth/login.html';
            }
        });

        async function loadDiscounts() {
            const token = localStorage.getItem('token');
            try {
                const response = await TB.apiFetch(API_URL);
                const data = response.data || response;
                const table = document.getElementById('discountTable');
                
                if (data.length === 0) {
                    table.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No discounts found.</td></tr>';
                    return;
                }

                table.innerHTML = data.map(d => `
                    <tr>
                        <td><strong>${escapeHtml(d.code)}</strong></td>
                        <td><span class="badge" style="background: var(--bg-light); color: var(--text-main);">${d.discountType}</span></td>
                        <td>${d.discountType === 'PERCENTAGE' ? d.value + '%' : formatPrice(d.value)}</td>
                        <td>${d.currentUsage} / ${d.usageLimit || '∞'}</td>
                        <td>${d.endDate ? new Date(d.endDate).toLocaleDateString() : 'No expiry'}</td>
                        <td><span class="badge ${d.isActive ? 'badge-success' : 'badge-danger'}">${d.isActive ? 'Active' : 'Inactive'}</span></td>
                        <td class="action-buttons">
                            <button class="btn btn-warning" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="editDiscount(${d.id})">Edit</button>
                            <button class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="deleteDiscount(${d.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('discountTable').innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem; color: var(--danger);">Error loading discounts.</td></tr>';
            }
        }

        function openModal(id = null) {
            document.getElementById('discountModal').style.display = 'flex';
            if (!id) {
                document.getElementById('discountId').value = '';
                document.getElementById('code').value = '';
                document.getElementById('value').value = '';
                document.getElementById('usageLimit').value = '';
                document.getElementById('endDate').value = '';
                document.getElementById('modalTitle').innerText = 'Add New Discount';
            }
        }

        function closeModal() {
            document.getElementById('discountModal').style.display = 'none';
        }

        async function saveDiscount() {
            const token = localStorage.getItem('token');
            const id = document.getElementById('discountId').value;
            const body = {
                code: document.getElementById('code').value.trim(),
                discountType: document.getElementById('discountType').value,
                value: parseFloat(document.getElementById('value').value),
                usageLimit: parseInt(document.getElementById('usageLimit').value) || 0,
                endDate: document.getElementById('endDate').value || null,
                isActive: document.getElementById('isActive').value === 'true'
            };

            if (!body.code || isNaN(body.value)) {
                showToast('Code and value are required!', 'error');
                return;
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                const res = await TB.apiFetch(url, {
                    method: method,
                    body: JSON.stringify(body)
                });

                showToast(id ? 'Discount updated successfully' : 'Discount created successfully', 'success');
                closeModal();
                loadDiscounts();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function editDiscount(id) {
            const token = localStorage.getItem('token');
            try {
                const response = await TB.apiFetch(`${API_URL}/${id}`);
                const data = response.data || response;
                document.getElementById('discountId').value = data.id;
                document.getElementById('code').value = data.code;
                document.getElementById('discountType').value = data.discountType;
                document.getElementById('value').value = data.value;
                document.getElementById('usageLimit').value = data.usageLimit;
                document.getElementById('isActive').value = data.isActive.toString();
                
                if (data.endDate) {
                    const date = new Date(data.endDate);
                    date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
                    document.getElementById('endDate').value = date.toISOString().slice(0, 16);
                } else {
                    document.getElementById('endDate').value = '';
                }

                document.getElementById('modalTitle').innerText = 'Edit Discount';
                document.getElementById('discountModal').style.display = 'flex';
            } catch (error) {
                showToast('Failed to load discount details', 'error');
            }
        }

        async function deleteDiscount(id) {
            if (confirm('Delete this discount?')) {
                const token = localStorage.getItem('token');
            try {
                await TB.apiFetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });
                showToast('Discount deleted successfully', 'success');
                loadDiscounts();
            } catch (error) {
                    showToast(error.message, 'error');
                }
            }
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(price);
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.onclick = function(event) {
            const modal = document.getElementById('discountModal');
            if (event.target === modal) closeModal();
        }

        loadDiscounts();
    </script>
</body>

</html>
