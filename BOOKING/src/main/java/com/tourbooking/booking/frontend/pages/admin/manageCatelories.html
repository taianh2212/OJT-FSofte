<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - TourBooking Admin</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--text-main);
            color: white;
            padding: 2rem 1.5rem;
        }

        .sidebar .logo {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 3rem;
            display: block;
            text-decoration: none;
        }

        .nav-item {
            padding: 0.75rem 1rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: block;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .main-content {
            flex: 1;
            padding: 2rem 5%;
            background-color: #f1f5f9;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #64748b;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            margin-right: 0.5rem;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .categories-table {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }

        tr:hover {
            background: #f8fafc;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 500px;
        }

        .modal-content h3 {
            margin-bottom: 1.5rem;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <a href="./dashboard.html" class="logo"><strong>TourBooking</strong> Admin</a>
            <nav>
                <a href="./dashboard.html" class="nav-item">Dashboard</a>
                <a href="./manageTours.html" class="nav-item">Manager Tours</a>
                <a href="./manageCatelories.html" class="nav-item active">Manager Categories</a>
                <a href="./manageUsers.html" class="nav-item">Manager User</a>
                <a href="./manageReview.html" class="nav-item">Manager Review </a>
                <a href="./financialReport.html" class="nav-item">Financial Report</a>

            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Manage Categories</h1>
                <div class="user-actions">
                    <span id="userInfo" style="font-weight: 600;"></span>
                    <button id="logoutBtn" class="btn-secondary" style="margin-left: 1rem;">Logout</button>
                </div>
            </header>

            <div class="page-header">
                <h2>Category List</h2>
                <button onclick="showCreateModal()" class="btn-primary">+ Create New Category</button>
            </div>

            <div class="categories-table">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Category Name</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="categoryTable">
                        <tr>
                            <td colspan="4" class="loading">Loading categories...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for Create/Edit -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Create Category</h3>
            <input type="hidden" id="categoryId">
            <input type="text" id="categoryName" placeholder="Category Name" required>
            <textarea id="categoryDesc" rows="3" placeholder="Description"></textarea>
            <div class="modal-buttons">
                <button onclick="closeModal()" class="btn-secondary">Cancel</button>
                <button onclick="saveCategory()" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8080/api/v1/categories";

        // Kiểm tra quyền ADMIN
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'ADMIN') {
            window.location.href = '/auth/login.html';
        } else {
            document.getElementById('userInfo').innerText = user.fullName;
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = '/auth/login.html';
        });

        let currentEditId = null;

        function loadCategories() {
            fetch(API)
                .then(res => {
                    if (!res.ok) throw new Error('Failed to fetch categories');
                    return res.json();
                })
                .then(data => {
                    if (!data || data.length === 0) {
                        document.getElementById("categoryTable").innerHTML = `
                            <tr>
                                <td colspan="4" class="empty-state">No categories found. Create your first category!</td>
                            </tr>
                        `;
                        return;
                    }

                    let html = "";
                    data.forEach(c => {
                        html += `
                            <tr>
                                <td>${c.categoryID}</td>
                                <td><strong>${escapeHtml(c.categoryName)}</strong></td>
                                <td>${escapeHtml(c.description || "—")}</td>
                                <td class="action-buttons">
                                    <button onclick="showEditModal(${c.categoryID}, '${escapeHtml(c.categoryName)}', '${escapeHtml(c.description || "")}')" class="btn-warning">Edit</button>
                                    <button onclick="deleteCategory(${c.categoryID})" class="btn-danger">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                    document.getElementById("categoryTable").innerHTML = html;
                })
                .catch(error => {
                    console.error('Error loading categories:', error);
                    document.getElementById("categoryTable").innerHTML = `
                        <tr>
                            <td colspan="4" class="empty-state">Error loading categories. Please try again.</td>
                        </tr>
                    `;
                });
        }

        function showCreateModal() {
            currentEditId = null;
            document.getElementById('modalTitle').innerText = 'Create Category';
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryDesc').value = '';
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function showEditModal(id, name, desc) {
            currentEditId = id;
            document.getElementById('modalTitle').innerText = 'Edit Category';
            document.getElementById('categoryId').value = id;
            document.getElementById('categoryName').value = name;
            document.getElementById('categoryDesc').value = desc;
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function saveCategory() {
            const name = document.getElementById('categoryName').value.trim();
            const desc = document.getElementById('categoryDesc').value.trim();

            if (!name) {
                alert('Category name is required!');
                return;
            }

            const categoryData = {
                categoryName: name,
                description: desc
            };

            let url = API;
            let method = 'POST';

            if (currentEditId) {
                url = `${API}/${currentEditId}`;
                method = 'PUT';
            }

            fetch(url, {
                method: method,
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(categoryData)
            })
                .then(res => {
                    if (!res.ok) throw new Error('Failed to save category');
                    return res.json();
                })
                .then(() => {
                    closeModal();
                    loadCategories();
                })
                .catch(error => {
                    console.error('Error saving category:', error);
                    alert('Failed to save category. Please try again.');
                });
        }

        function deleteCategory(id) {
            if (confirm('Are you sure you want to delete this category?')) {
                fetch(`${API}/${id}`, {
                    method: "DELETE"
                })
                    .then(res => {
                        if (!res.ok) throw new Error('Failed to delete category');
                        loadCategories();
                    })
                    .catch(error => {
                        console.error('Error deleting category:', error);
                        alert('Failed to delete category. Please try again.');
                    });
            }
        }

        function closeModal() {
            document.getElementById('categoryModal').style.display = 'none';
            currentEditId = null;
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('categoryModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load categories on page load
        loadCategories();
    </script>
</body>

</html>
