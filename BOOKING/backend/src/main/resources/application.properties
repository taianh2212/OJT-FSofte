server.port=8080
# Load .env file natively (Spring Boot 2.4+)
spring.config.import=optional:file:.env[.properties]

# ====================== PAYOS ======================
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.base-url=${PAYOS_BASE_URL:https://api-merchant.payos.vn}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:3000/pages/payment-return.html}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:3000/pages/payment-return.html?status=CANCELLED}

# ====================== MAIL ======================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# ====================== JWT ======================
app.jwt.secret=${APP_JWT_SECRET:local-dev-jwt-secret-change-me}
app.jwt.exp-minutes=${APP_JWT_EXP_MINUTES:120}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}

# ====================== GEMINI ======================
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com}

# ====================== DATABASE ======================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:20}
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_DETECTION_MS:15000}

# ====================== JPA ======================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Use classpath for packaged resources
spring.web.resources.static-locations=classpath:/static/
