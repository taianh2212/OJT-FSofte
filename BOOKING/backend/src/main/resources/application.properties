# ==============================================================================
# Server Configuration
# ==============================================================================
spring.application.name=booking
server.port=8080
server.servlet.context-path=/api

# ==============================================================================
# Database Configuration (H2 - In-Memory for Development)
# ==============================================================================
spring.datasource.url=jdbc:h2:mem:tourbooking
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (enable for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Disable SQL seeding for H2
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true

# ==============================================================================
# JWT Configuration
# ==============================================================================
app.jwt.secret=your-secret-key-here-make-it-long-and-secure-at-least-64-characters-for-hs256
app.jwt.exp-minutes=120

# ==============================================================================
# PayOS Configuration
# ==============================================================================
payos.client-id=your-payos-client-id
payos.api-key=your-payos-api-key
payos.checksum-key=your-payos-checksum-key

# ==============================================================================
# OpenTripMap Configuration
# ==============================================================================
opentripmap.scheduler-max-cities-per-run=5
opentripmap.scheduler-cities=Da Nang,Ho Chi Minh,Hanoi

# ==============================================================================
# Mail Configuration (Gmail example)
# ==============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==============================================================================
# Google OAuth Configuration
# ==============================================================================
spring.security.oauth2.client.registration.google.client-id=your-google-client-id
spring.security.oauth2.client.registration.google.client-secret=your-google-client-secret

# ==============================================================================
# AI Configuration (Gemini)
# ==============================================================================
gemini.api.key=AIzaSyDOTzAh47-sv-i0KCVianQq0NoKU_qht3A
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent

# ==============================================================================
# Application Configuration
# ==============================================================================
app.public-base-url=http://localhost:8080/api

# ==============================================================================
# Logging Configuration
# ==============================================================================
logging.level.root=INFO
logging.level.com.tourbooking.booking.backend=DEBUG
logging.file.name=logs/application.log
