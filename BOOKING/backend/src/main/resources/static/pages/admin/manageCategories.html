<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - TourBooking Admin</title>
    <link rel="stylesheet" href="../../assets/css/admin-common.css">
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/toast.js"></script>
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <a href="./dashboard.html" class="logo">TourBooking</a>
            <nav>
                <a href="./dashboard.html" class="nav-item">Dashboard</a>
                <a href="./manageTours.html" class="nav-item">Tours</a>
                <a href="./manageCategories.html" class="nav-item active">Categories</a>
                <a href="./manageDiscounts.html" class="nav-item">Discounts</a>
                <a href="./manageUsers.html" class="nav-item">Users</a>
                <a href="./manageReview.html" class="nav-item">Reviews</a>
                <a href="./financialReport.html" class="nav-item">Financial Report</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Categories</h1>
                <div class="user-actions">
                    <span id="userInfo" style="font-weight: 600;"></span>
                    <button id="logoutBtn" class="btn btn-secondary" style="margin-left: 1rem;">Logout</button>
                </div>
            </header>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Category List</h2>
                    <button onclick="showCreateModal()" class="btn btn-primary">Create New Category</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Category Name</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="categoryTable">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 2rem;">Loading categories...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Create/Edit -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Create Category</h3>
            <input type="hidden" id="categoryId">
            <div class="form-group">
                <label>Category Name *</label>
                <input type="text" id="categoryName" class="form-control" placeholder="Category Name" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="categoryDesc" class="form-control" rows="3" placeholder="Description"></textarea>
            </div>
            <div class="modal-buttons">
                <button onclick="closeModal()" class="btn btn-secondary">Cancel</button>
                <button onclick="saveCategory()" class="btn btn-primary">Save Category</button>
            </div>
        </div>
    </div>

    <script>
        const API = "/api/v1/categories";

        // Kiểm tra quyền ADMIN
        function checkAuth() {
            try {
                const userStr = localStorage.getItem('user');
                if (!userStr) {
                    window.location.href = '/pages/auth/login.html';
                    return false;
                }

                const user = JSON.parse(userStr);
                if (!user || user.role !== 'ADMIN') {
                    window.location.href = '/pages/auth/login.html';
                    return false;
                }

                document.getElementById('userInfo').innerText = user.fullName || user.FullName || user.email;
                return true;
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = '/pages/auth/login.html';
                return false;
            }
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (window.TB && TB.logout) {
                TB.logout();
            } else {
                localStorage.removeItem('user');
                localStorage.removeItem('token');
                window.location.href = '/pages/auth/login.html';
            }
        });

        let currentEditId = null;

        function getHeaders() {
            const token = localStorage.getItem('token');
            const headers = {
                "Content-Type": "application/json"
            };
            if (token) {
                headers["Authorization"] = `Bearer ${token}`;
            }
            return headers;
        }

        async function loadCategories() {
            try {
                const response = await TB.apiFetch(API);
                const data = response.data || response;
                if (!data || data.length === 0) {
                    document.getElementById("categoryTable").innerHTML = `
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 2rem;">No categories found.</td>
                        </tr>
                    `;
                    return;
                }

                let html = "";
                data.forEach(c => {
                    html += `
                        <tr>
                            <td>${c.id}</td>
                            <td><strong>${escapeHtml(c.categoryName)}</strong></td>
                            <td>${escapeHtml(c.description || "-")}</td>
                            <td class="action-buttons">
                                <button onclick="showEditModal(${c.id}, '${escapeHtml(c.categoryName)}', '${escapeHtml(c.description || "")}')" class="btn btn-warning" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">Edit</button>
                                <button onclick="deleteCategory(${c.id})" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">Delete</button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById("categoryTable").innerHTML = html;
            } catch (error) {
                console.error('Error loading categories:', error);
                document.getElementById("categoryTable").innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 2rem; color: var(--danger);">Error loading categories.</td>
                    </tr>
                `;
            }
        }

        function showCreateModal() {
            currentEditId = null;
            document.getElementById('modalTitle').innerText = 'Create Category';
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryDesc').value = '';
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function showEditModal(id, name, desc) {
            currentEditId = id;
            document.getElementById('modalTitle').innerText = 'Edit Category';
            document.getElementById('categoryId').value = id;
            document.getElementById('categoryName').value = name;
            document.getElementById('categoryDesc').value = desc;
            document.getElementById('categoryModal').style.display = 'flex';
        }

        async function saveCategory() {
            const name = document.getElementById('categoryName').value.trim();
            const desc = document.getElementById('categoryDesc').value.trim();

            if (!name) {
                showToast('Category name is required!', 'error');
                return;
            }

            const categoryData = {
                categoryName: name,
                description: desc
            };

            let url = API;
            let method = 'POST';

            if (currentEditId) {
                url = `${API}/${currentEditId}`;
                method = 'PUT';
            }

            try {
                await TB.apiFetch(url, {
                    method: method,
                    body: JSON.stringify(categoryData)
                });
                closeModal();
                loadCategories();
                showToast(currentEditId ? 'Category updated successfully!' : 'Category created successfully!', 'success');
            } catch (error) {
                console.error('Error saving category:', error);
                showToast('Error: ' + (error.message || 'Unknown error'), 'error');
            }
        }

        async function deleteCategory(id) {
            if (!confirm('Are you sure you want to delete this category?')) return;
            try {
                await TB.apiFetch(`${API}/${id}`, {
                    method: "DELETE"
                });
                loadCategories();
                showToast('Category deleted successfully!', 'success');
            } catch (error) {
                console.error('Error deleting category:', error);
                showToast('Error: ' + error.message, 'error');
            }
        }

        function closeModal() {
            document.getElementById('categoryModal').style.display = 'none';
        }

        window.onclick = function (event) {
            const modal = document.getElementById('categoryModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Init
        if (checkAuth()) {
            loadCategories();
        }
    </script>
</body>

</html>
