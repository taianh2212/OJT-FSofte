<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reviews - TourBooking Admin</title>
    <link rel="stylesheet" href="../../assets/css/admin-common.css">
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/toast.js"></script>
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <a href="./dashboard.html" class="logo">TourBooking</a>
            <nav>
                <a href="./dashboard.html" class="nav-item">Dashboard</a>
                <a href="./manageTours.html" class="nav-item">Tours</a>
                <a href="./manageCategories.html" class="nav-item">Categories</a>
                <a href="./manageUsers.html" class="nav-item">Users</a>
                <a href="./manageReview.html" class="nav-item active">Reviews</a>
                <a href="./financialReport.html" class="nav-item">Financial Report</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Reviews</h1>
                <div class="user-actions">
                    <span id="userInfo" style="font-weight: 600;"></span>
                    <button id="logoutBtn" class="btn btn-secondary" style="margin-left: 1rem;">Logout</button>
                </div>
            </header>

            <div class="card" style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Review Statistics</h2>
                </div>
                <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem;">
                    <div class="stat-card" style="background: var(--bg-light); padding: 1rem; border-radius: 0.5rem; text-align: center;">
                        <small style="color: var(--text-muted); display: block; margin-bottom: 0.5rem;">Total Reviews</small>
                        <strong id="totalReviews" style="font-size: 1.5rem; color: var(--primary);">0</strong>
                    </div>
                    <div class="stat-card" style="background: var(--bg-light); padding: 1rem; border-radius: 0.5rem; text-align: center;">
                        <small style="color: var(--text-muted); display: block; margin-bottom: 0.5rem;">Avg Rating</small>
                        <strong id="avgRating" style="font-size: 1.5rem; color: var(--warning);">0</strong>
                    </div>
                    <div class="stat-card" style="background: var(--bg-light); padding: 0.5rem; border-radius: 0.5rem; text-align: center;">
                        <small style="color: var(--text-muted);">5 Stars</small>
                        <strong id="rating5" style="display: block; color: var(--success);">0</strong>
                    </div>
                    <div class="stat-card" style="background: var(--bg-light); padding: 0.5rem; border-radius: 0.5rem; text-align: center;">
                        <small style="color: var(--text-muted);">4 Stars</small>
                        <strong id="rating4" style="display: block; color: var(--primary);">0</strong>
                    </div>
                    <div class="stat-card" style="background: var(--bg-light); padding: 0.5rem; border-radius: 0.5rem; text-align: center;">
                        <small style="color: var(--text-muted);">3 Stars</small>
                        <strong id="rating3" style="display: block; color: var(--warning);">0</strong>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="filter-bar" style="display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: center; flex-wrap: wrap;">
                    <div class="form-group" style="margin-bottom: 0; min-width: 150px;">
                        <select id="ratingFilter" class="form-control" onchange="loadReviews()">
                            <option value="all">All Ratings</option>
                            <option value="5">5 Stars</option>
                            <option value="4">4 Stars</option>
                            <option value="3">3 Stars</option>
                            <option value="2">2 Stars</option>
                            <option value="1">1 Star</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <input type="text" id="tourFilter" class="form-control" placeholder="Search by Tour ID..." onkeyup="loadReviews()">
                    </div>
                    <button onclick="loadReviews()" class="btn btn-secondary">Refresh</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>User</th>
                                <th>Tour</th>
                                <th>Rating</th>
                                <th>Comment</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="reviewTable">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 2rem;">Loading reviews...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div id="pagination" class="pagination-container"></div>
            </div>
        </main>
    </div>

    <script>
        const API = "/api/v1/reviews";

        // Auth check
        const currentUser = JSON.parse(localStorage.getItem('user'));
        if (!currentUser || currentUser.role !== 'ADMIN') {
            window.location.href = '/pages/auth/login.html';
        } else {
            document.getElementById('userInfo').innerText = currentUser.fullName || currentUser.FullName || currentUser.email;
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (window.TB && TB.logout) {
                TB.logout();
            } else {
                localStorage.removeItem('user');
                localStorage.removeItem('token');
                window.location.href = '/pages/auth/login.html';
            }
        });

        let currentPage = 0;
        let pageSize = 10;

        async function loadReviews(page = 0) {
            currentPage = page;
            const reviewTable = document.getElementById("reviewTable");
            const rating = document.getElementById('ratingFilter').value;
            const tourId = document.getElementById('tourFilter').value;
            
            try {
                let url = `${API}?page=${page}&size=${pageSize}`;
                if (rating && rating !== 'all') {
                    url += `&rating=${rating}`;
                }
                if (tourId) {
                    url += `&tourId=${tourId}`;
                }
                const response = await TB.apiFetch(url);
                const data = response.data;
                const reviews = data.content;

                if (!reviews || reviews.length === 0) {
                    reviewTable.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No reviews found.</td></tr>';
                    updateStatsFromPagedData(data);
                    renderPagination(0, 0);
                    return;
                }

                let html = "";
                reviews.forEach(r => {
                    html += `
                        <tr>
                            <td>${r.reviewId}</td>
                            <td><strong>${r.userId || '—'}</strong></td>
                            <td><span style="font-size: 0.8rem;">${r.tourId || '—'}</span><br><strong>${escapeHtml(r.tourName || '—')}</strong></td>
                            <td>${renderStars(r.rating)}</td>
                            <td style="max-width: 300px; font-size: 0.9rem;">${escapeHtml(r.comment || '—')}</td>
                            <td>${formatDate(r.createdAt)}</td>
                            <td class="action-buttons">
                                <button onclick="deleteReviewById(${r.reviewId})" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">Delete</button>
                            </td>
                        </tr>
                    `;
                });
                reviewTable.innerHTML = html;
                updateStatsFromPagedData(data);
                renderPagination(data.totalPages, data.page);
            } catch (error) {
                console.error('Error loading reviews:', error);
                reviewTable.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 2rem; color: var(--danger);">Error loading reviews: ${error.message}</td></tr>`;
            }
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= rating ? '★' : '☆';
            }
            const colorClass = rating >= 4 ? 'success' : (rating >= 3 ? 'warning' : 'danger');
            return `<span class="badge badge-${colorClass}" style="letter-spacing: 2px;">${stars}</span>`;
        }

        function updateStatsFromPagedData(data) {
            document.getElementById('totalReviews').innerText = data.totalElements || 0;
            // Statistics like Avg Rating would need a separate summary API or be included in PagedResponse
            // For now, I'll clear them or keep them as '-'
            document.getElementById('avgRating').innerText = '-';
            document.getElementById('rating5').innerText = '-';
            document.getElementById('rating4').innerText = '-';
            document.getElementById('rating3').innerText = '-';
        }

        function renderPagination(totalPages, currentPage) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'flex';
            
            let html = `
                <button class="page-btn" ${currentPage === 0 ? 'disabled' : ''} onclick="loadReviews(${currentPage - 1})">&laquo;</button>
            `;
            
            for (let i = 0; i < totalPages; i++) {
                if (i === 0 || i === totalPages - 1 || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadReviews(${i})">${i + 1}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span class="page-info">...</span>`;
                }
            }
            
            html += `
                <button class="page-btn" ${currentPage === totalPages - 1 ? 'disabled' : ''} onclick="loadReviews(${currentPage + 1})">&raquo;</button>
            `;
            container.innerHTML = html;
        }

        async function deleteReviewById(id) {
            if (confirm('Delete this review permanently?')) {
                try {
                    await TB.apiFetch(`${API}/${id}`, {
                        method: "DELETE"
                    });
                    showToast('Review deleted successfully!', 'success');
                    loadReviews();
                } catch (error) {
                    showToast('Error: ' + error.message, 'error');
                }
            }
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            return new Date(dateString).toLocaleDateString('vi-VN');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadReviews();
    </script>
</body>

</html>
