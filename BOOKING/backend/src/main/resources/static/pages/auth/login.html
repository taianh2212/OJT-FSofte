<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - DANANGBEST</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: white;
      width: 100%;
      max-width: 480px;
      border-radius: var(--radius-lg);
      padding: 50px;
      box-shadow: var(--shadow-premium);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-header .brand-mark {
      width: 60px;
      height: 60px;
      background: var(--primary);
      color: white;
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      font-weight: 800;
      border-radius: 15px;
      margin: 0 auto 20px;
    }

    .auth-header h1 {
      font-size: 1.8rem;
      color: var(--primary);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .tabs {
      display: flex;
      gap: 10px;
      background: var(--bg-section);
      padding: 6px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
      color: var(--text-soft);
    }

    .tab.active {
      background: white;
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      height: 55px;
      padding: 0 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-family: inherit;
      font-weight: 600;
      transition: 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(6, 78, 59, 0.1);
    }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .btn-auth {
      width: 100%;
      height: 55px;
      margin-top: 10px;
      font-size: 1rem;
      font-weight: 800;
    }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-faint);
    }

    .back-home:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="auth-card reveal visible">
    <div class="auth-header">
      <div class="brand-mark">DB</div>
      <h1>Chào mừng bạn</h1>
      <p style="color: var(--text-soft); font-size: 0.95rem; margin-top: 5px;">Khám phá Đà Nẵng cùng Danangbest</p>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="login">Đăng nhập</div>
      <div class="tab" data-tab="register">Đăng ký</div>
    </div>

    <div id="loginSection" class="form-section active">
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-search btn-auth">ĐĂNG NHẬP</button>
        <div id="loginMessage" style="margin-top: 15px; font-size: 0.85rem; text-align: center; font-weight: 600;"></div>
      </form>
    </div>

    <div id="registerSection" class="form-section">
        <form id="registerForm">
          <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" id="regName" placeholder="Nguyễn Văn A" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="name@example.com" required>
          </div>
          <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="regPassword" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-search btn-auth">TẠO TÀI KHOẢN</button>
          <div id="registerMessage" style="margin-top: 15px; font-size: 0.85rem; text-align: center; font-weight: 600;"></div>
        </form>
    </div>

    <a href="../index.html" class="back-home">← Quay lại trang chủ</a>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script>
    const tabs = document.querySelectorAll('.tab');
    const sections = document.querySelectorAll('.form-section');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach(t => t.classList.remove('active'));
        sections.forEach(s => s.classList.remove('active'));
        
        tab.classList.add('active');
        document.getElementById(target + 'Section').classList.add('active');
      });
    });
  </script>
</body>
</html>
