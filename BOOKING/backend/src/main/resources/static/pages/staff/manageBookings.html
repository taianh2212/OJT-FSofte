<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings - Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .staff-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #082f49; color: white; padding: 2rem 1.5rem; }
        .sidebar .logo { color: white; font-size: 1.5rem; margin-bottom: 3rem; display: block; text-decoration: none; font-weight: bold; }
        .nav-item { padding: 0.75rem 1rem; color: rgba(255, 255, 255, 0.7); text-decoration: none; display: block; border-radius: 0.5rem; margin-bottom: 0.5rem; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }
        .main-content { flex: 1; padding: 2rem 5%; background-color: #f1f5f9; overflow-y: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        .data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .data-table th { background: #f8fafc; font-weight: 600; color: #475569; }
        
        .action-btn { background: #0f766e; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .action-btn:hover { background: #115e59; }

        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }
        .status-pending { background: #fef08a; color: #854d0e; }
        .status-confirmed { background: #bbf7d0; color: #166534; }
        .status-cancelled { background: #fecaca; color: #991b1b; }
    </style>
</head>

<body>
    <div class="staff-layout">
        <aside class="sidebar">
            <a href="#" class="logo"><strong>Staff</strong> Portal</a>
            <nav id="sidebarNav">
                <a href="./dashboard.html" class="nav-item">Dashboard</a>
                <a href="./manageBookings.html" class="nav-item active">Manage Bookings</a>
                <a href="./manageSchedules.html" class="nav-item">Manage Schedules</a>
                <a href="./manageRefunds.html" class="nav-item">Manage Refunds</a>
                <a href="./chat-escalations.html" class="nav-item">Chat / Escalations</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Manage Bookings</h1>
                <div class="user-actions">
                    <span id="userInfo" style="font-weight: 600;"></span>
                </div>
            </header>

            <table class="data-table" id="bookingsTable">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>User</th>
                        <th>Tour Schedule</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="6">Loading...</td></tr>
                </tbody>
            </table>
        </main>
    </div>

    <script>
        // STAFF-only guard ΓÇö Admin bi redirect ve admin dashboard
        (function() {
            var userStr = localStorage.getItem('user');
            if (!userStr) { window.location.href = '/pages/auth/login.html'; return; }
            var user = JSON.parse(userStr);
            if (user.role === 'ADMIN') { window.location.href = '/pages/admin/dashboard.html'; return; }
            if (user.role !== 'STAFF') { window.location.href = '/pages/auth/login.html'; return; }
            document.getElementById('userInfo') && (document.getElementById('userInfo').innerText = user.fullName || user.email);
        })();
    </script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/admin-bookings.js"></script>
</body>
</html>
